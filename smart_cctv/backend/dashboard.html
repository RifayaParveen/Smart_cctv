<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartEye — AI Security Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ───────────────────────────────────────── */
:root {
  --bg:        #080c0f;
  --surface:   #0d1318;
  --card:      #111820;
  --border:    #1e2d3a;
  --accent:    #00e5ff;
  --accent2:   #ff3d71;
  --ok:        #00e676;
  --warn:      #ffea00;
  --text:      #cdd8e0;
  --dim:       #4a6070;
  --mono:      'Share Tech Mono', monospace;
  --sans:      'Rajdhani', sans-serif;
  --radius:    4px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scan-line overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.07) 2px,
    rgba(0,0,0,.07) 4px
  );
}

/* ── Header ─────────────────────────────────────────────── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 100;
}

.logo {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  animation: pulse 2s ease-in-out infinite;
}
.logo-icon svg { width: 18px; height: 18px; fill: var(--bg); }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,229,255,.4); }
  50%      { box-shadow: 0 0 0 10px rgba(0,229,255,0); }
}
.logo-text { font-size: 22px; font-weight: 700; letter-spacing: 3px;
             color: #fff; }
.logo-sub  { font-family: var(--mono); font-size: 10px; color: var(--dim);
             letter-spacing: 2px; margin-top: 1px; }

.header-right { display: flex; align-items: center; gap: 20px; }

#live-indicator {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; color: var(--ok);
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ok);
  animation: blink 1.2s step-start infinite;
}
@keyframes blink { 50% { opacity: 0; } }

#clock {
  font-family: var(--mono); font-size: 13px; color: var(--dim);
}

/* ── Layout ─────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  height: calc(100vh - 57px);
}

/* ── Sidebar ─────────────────────────────────────────────── */
aside {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  color: var(--dim);
  display: flex; align-items: center; justify-content: space-between;
}

.count-badge {
  background: var(--accent); color: var(--bg);
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 20px; font-family: var(--mono);
}

/* Filter bar */
.filter-bar {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.filter-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent; color: var(--dim);
  cursor: pointer; transition: all .2s;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--accent); color: var(--accent);
  background: rgba(0,229,255,.06);
}

#clip-list {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.clip-item {
  display: flex; gap: 10px; padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .15s;
  position: relative;
}
.clip-item:hover   { background: rgba(0,229,255,.04); }
.clip-item.active  { background: rgba(0,229,255,.09);
                      border-left: 3px solid var(--accent); }

.clip-thumb {
  width: 70px; height: 46px; object-fit: cover;
  border-radius: var(--radius); flex-shrink: 0;
  background: var(--card);
  border: 1px solid var(--border);
}
.clip-thumb-placeholder {
  width: 70px; height: 46px; flex-shrink: 0;
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 18px;
}

.clip-meta { flex: 1; min-width: 0; }
.clip-label {
  font-size: 13px; font-weight: 600;
  color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.clip-time {
  font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 3px;
}
.clip-status {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  margin-top: 4px;
}
.status-ready    { color: var(--ok); }
.status-encoding { color: var(--warn); }
.status-error    { color: var(--accent2); }
.status-receiving{ color: var(--accent); }

/* ── Main panel ──────────────────────────────────────────── */
main {
  display: flex; flex-direction: column;
  background: var(--bg); overflow: hidden;
}

/* Stats bar */
.stats-bar {
  display: flex; gap: 1px;
  border-bottom: 1px solid var(--border);
  background: var(--border);
  flex-shrink: 0;
}
.stat-cell {
  flex: 1; background: var(--surface);
  padding: 12px 20px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-val {
  font-size: 24px; font-weight: 700; color: #fff;
  font-family: var(--mono);
}
.stat-key {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--dim);
}

/* Player area */
.player-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  background: radial-gradient(ellipse at center, #0d1a22 0%, var(--bg) 70%);
}

.empty-state {
  text-align: center; color: var(--dim);
}
.empty-icon { font-size: 64px; margin-bottom: 16px; opacity: .3; }
.empty-state h2 { font-size: 20px; font-weight: 600; color: var(--dim); }
.empty-state p  { font-family: var(--mono); font-size: 12px; margin-top: 8px; }

#video-wrap {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 20px;
}

#main-video {
  max-width: 100%; max-height: calc(100% - 120px);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: #000;
  box-shadow: 0 0 60px rgba(0,229,255,.08);
}

.video-info {
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  justify-content: center;
}
.info-chip {
  font-family: var(--mono); font-size: 11px;
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
}
.info-chip span { color: var(--accent); }

.label-chip {
  font-size: 13px; font-weight: 700; letter-spacing: 2px;
  padding: 6px 18px;
  border-radius: 20px;
  text-transform: uppercase;
}
.label-person   { background: rgba(0,229,255,.12); color: var(--accent);  border: 1px solid var(--accent); }
.label-dog      { background: rgba(0,230,118,.12); color: var(--ok);       border: 1px solid var(--ok); }
.label-car      { background: rgba(255,61,113,.12); color: var(--accent2); border: 1px solid var(--accent2); }
.label-default  { background: rgba(255,234,0,.08);  color: var(--warn);    border: 1px solid var(--warn); }

/* Overlay corner labels on video */
.video-overlay {
  position: absolute; top: 20px; left: 20px;
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  letter-spacing: 2px; opacity: .7;
  pointer-events: none;
}
.video-overlay-br {
  position: absolute; bottom: 20px; right: 20px;
  font-family: var(--mono); font-size: 10px; color: var(--dim);
  pointer-events: none;
}

/* ── Label distribution bar ─────────────────────────────── */
.label-bar-section {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.label-bar-title {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
  color: var(--dim); margin-bottom: 8px;
}
.label-bar-row { display: flex; gap: 4px; height: 20px; border-radius: var(--radius); overflow: hidden; }
.label-seg { height: 100%; transition: flex .6s ease; display: flex;
             align-items: center; justify-content: center;
             font-family: var(--mono); font-size: 9px; font-weight: 700;
             overflow: hidden; white-space: nowrap; min-width: 0; }
.label-legend {
  display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 10px; color: var(--dim);
}
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }

/* ── Toast ───────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--accent);
  color: var(--accent); font-family: var(--mono); font-size: 12px;
  padding: 10px 24px; border-radius: 4px;
  opacity: 0; transition: opacity .3s; pointer-events: none;
  z-index: 10000;
}
#toast.show { opacity: 1; }

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    </div>
    <div>
      <div class="logo-text">SMARTEYE</div>
      <div class="logo-sub">AI SECURITY SYSTEM</div>
    </div>
  </div>
  <div class="header-right">
    <div id="live-indicator">
      <div class="live-dot"></div>
      MONITORING
    </div>
    <div id="clock">--:--:--</div>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-header">
      MOTION EVENTS
      <span class="count-badge" id="clip-count">0</span>
    </div>
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-filter="all">ALL</button>
    </div>
    <div id="clip-list">
      <div style="padding:24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--dim)">
        Waiting for events…
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="stats-bar">
      <div class="stat-cell">
        <div class="stat-val" id="s-total">0</div>
        <div class="stat-key">TOTAL EVENTS</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="s-today">0</div>
        <div class="stat-key">TODAY</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="s-top-label">—</div>
        <div class="stat-key">TOP DETECTION</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="s-device">ESP32</div>
        <div class="stat-key">DEVICE</div>
      </div>
    </div>

    <div class="player-area" id="player-area">
      <div class="video-overlay">CAM-01 ● REC</div>
      <div class="video-overlay-br" id="overlay-ts">--</div>

      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📷</div>
        <h2>No event selected</h2>
        <p>Select a motion event from the list</p>
      </div>

      <div id="video-wrap" style="display:none">
        <video id="main-video" controls autoplay muted playsinline>
          Your browser doesn't support WebM video.
        </video>
        <div class="video-info" id="video-info"></div>
      </div>
    </div>

    <div class="label-bar-section">
      <div class="label-bar-title">DETECTION DISTRIBUTION</div>
      <div class="label-bar-row" id="label-bar"></div>
      <div class="label-legend" id="label-legend"></div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const API = '';  // same origin — dashboard is served by backend

// ─── State ─────────────────────────────────────────────────────────────────
let allClips    = [];
let activeFilter = 'all';
let activeClipId = null;

// ─── Colour palette for labels ─────────────────────────────────────────────
const LABEL_COLORS = {
  person:   '#00e5ff', dog:    '#00e676', cat:    '#69f0ae',
  car:      '#ff3d71', bird:   '#ffea00', mailman:'#ff9100',
  delivery: '#e040fb', unknown:'#546e7a', default:'#607d8b',
};
function labelColor(l) {
  return LABEL_COLORS[l?.toLowerCase()] || LABEL_COLORS.default;
}
function labelClass(l) {
  if (!l) return 'label-default';
  const k = l.toLowerCase();
  if (k === 'person' || k === 'mailman' || k === 'delivery') return 'label-chip label-person';
  if (k === 'dog' || k === 'cat' || k === 'bird') return 'label-chip label-dog';
  if (k === 'car') return 'label-chip label-car';
  return 'label-chip label-default';
}

// ─── Clock ─────────────────────────────────────────────────────────────────
function tickClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB', { hour12: false });
}
setInterval(tickClock, 1000);
tickClock();

// ─── Fetch & Render ────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const [clipsRes, statsRes] = await Promise.all([
      fetch(API + '/api/clips?limit=100'),
      fetch(API + '/api/stats'),
    ]);
    const clipsData = await clipsRes.json();
    const statsData = await statsRes.json();
    allClips = clipsData.clips || [];
    renderStats(statsData);
    renderFilters(statsData.by_label || {});
    renderClipList();
    renderDistributionBar(statsData.by_label || {});
  } catch(e) {
    console.error('fetch error', e);
  }
}

function renderStats(s) {
  document.getElementById('s-total').textContent = s.total_clips ?? 0;

  const today = new Date().toDateString();
  const todayCount = allClips.filter(c =>
    new Date(c.timestamp).toDateString() === today
  ).length;
  document.getElementById('s-today').textContent = todayCount;

  const byLabel = s.by_label || {};
  const topLabel = Object.entries(byLabel).sort((a,b) => b[1]-a[1])[0];
  document.getElementById('s-top-label').textContent =
    topLabel ? topLabel[0].toUpperCase() : '—';
}

function renderFilters(byLabel) {
  const bar = document.getElementById('filter-bar');
  const existing = new Set([...bar.querySelectorAll('.filter-btn')].map(b => b.dataset.filter));
  Object.keys(byLabel).forEach(lbl => {
    if (!existing.has(lbl)) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = lbl;
      btn.textContent = lbl.toUpperCase();
      btn.onclick = () => setFilter(lbl);
      bar.appendChild(btn);
      existing.add(lbl);
    }
  });
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderClipList();
}
document.querySelector('.filter-btn[data-filter="all"]').onclick = () => setFilter('all');

function renderClipList() {
  const list = document.getElementById('clip-list');
  const filtered = activeFilter === 'all'
    ? allClips
    : allClips.filter(c => c.ai_label?.toLowerCase() === activeFilter);

  document.getElementById('clip-count').textContent = filtered.length;

  if (!filtered.length) {
    list.innerHTML = '<div style="padding:24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--dim)">No events</div>';
    return;
  }

  list.innerHTML = filtered.map(c => {
    const time = new Date(c.timestamp).toLocaleTimeString('en-GB', { hour12: false });
    const date = new Date(c.timestamp).toLocaleDateString('en-GB', { month: 'short', day: 'numeric' });
    const lbl  = c.ai_label || 'unknown';
    const thumb = c.thumbnail_url
      ? `<img class="clip-thumb" src="${c.thumbnail_url}" alt="" loading="lazy">`
      : `<div class="clip-thumb-placeholder">📷</div>`;

    return `
    <div class="clip-item${c.clip_id === activeClipId ? ' active' : ''}"
         onclick="selectClip('${c.clip_id}')">
      ${thumb}
      <div class="clip-meta">
        <div class="clip-label">${lbl.toUpperCase()}</div>
        <div class="clip-time">${date} · ${time}</div>
        <div class="clip-status status-${c.status}">${c.status.toUpperCase()}</div>
      </div>
    </div>`;
  }).join('');
}

function renderDistributionBar(byLabel) {
  const bar    = document.getElementById('label-bar');
  const legend = document.getElementById('label-legend');
  const total  = Object.values(byLabel).reduce((a,b) => a+b, 0) || 1;
  const entries = Object.entries(byLabel).sort((a,b) => b[1]-a[1]);

  bar.innerHTML = entries.map(([lbl, cnt]) => {
    const pct  = (cnt / total * 100).toFixed(1);
    const col  = labelColor(lbl);
    return `<div class="label-seg" style="flex:${cnt};background:${col}22;border:1px solid ${col}44;color:${col}"
                 title="${lbl}: ${cnt} (${pct}%)">
              ${pct > 8 ? lbl.toUpperCase() : ''}
            </div>`;
  }).join('');

  legend.innerHTML = entries.map(([lbl, cnt]) =>
    `<div class="legend-item">
       <div class="legend-dot" style="background:${labelColor(lbl)}"></div>
       ${lbl} (${cnt})
     </div>`
  ).join('');
}

// ─── Select & Play Clip ────────────────────────────────────────────────────
async function selectClip(clipId) {
  activeClipId = clipId;
  const clip = allClips.find(c => c.clip_id === clipId);
  if (!clip) return;
  renderClipList(); // re-render to show active state

  const wrap  = document.getElementById('video-wrap');
  const empty = document.getElementById('empty-state');
  const video = document.getElementById('main-video');
  const info  = document.getElementById('video-info');
  const ts    = document.getElementById('overlay-ts');

  empty.style.display = 'none';
  wrap.style.display  = 'flex';

  if (clip.status !== 'ready' || !clip.video_url) {
    video.src = '';
    info.innerHTML = `<div class="info-chip" style="color:var(--warn)">
      ⏳ ${clip.status.toUpperCase()} — video not yet available</div>`;
    return;
  }

  video.src = clip.video_url;
  video.load();
  video.play().catch(() => {});

  const dur  = clip.duration_ms ? (clip.duration_ms / 1000).toFixed(1) + 's' : '—';
  const lbl  = clip.ai_label || 'unknown';
  const timeStr = new Date(clip.timestamp).toLocaleString('en-GB');

  ts.textContent = timeStr;

  info.innerHTML = `
    <div class="${labelClass(lbl)}">${lbl.toUpperCase()}</div>
    <div class="info-chip">FRAMES <span>${clip.frame_count ?? '—'}</span></div>
    <div class="info-chip">DURATION <span>${dur}</span></div>
    <div class="info-chip">DEVICE <span>${clip.device_id ?? 'ESP32'}</span></div>
  `;
}

// ─── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── Auto-refresh every 5 s ─────────────────────────────────────────────────
let lastCount = 0;
async function poll() {
  const before = allClips.length;
  await fetchData();
  if (allClips.length > before) {
    const newest = allClips[0];
    showToast(`🚨 New event: ${(newest.ai_label || 'unknown').toUpperCase()}`);
  }
}
fetchData();

  
setInterval(poll, 5000);
</script>
</body>
</html>
